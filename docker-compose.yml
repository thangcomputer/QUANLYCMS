services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  api:
    build: .
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/quanlycms
    depends_on:
      - mongo

volumes:
  mongo_data:
